services:
  ada:
    image: ghcr.io/etlon/ada_v2:latest
    container_name: ada-v2
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - HA_URL=${HA_URL}
      - HA_TOKEN=${HA_TOKEN}
      - FRIGATE_URL=${FRIGATE_URL}
      - MQTT_BROKER=${MQTT_BROKER:-192.168.2.91}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_USER=${MQTT_USER:-}
      - MQTT_PASS=${MQTT_PASS:-}
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - /mnt/user/appdata/ada-v2/settings.json:/app/backend/settings.json
      - /mnt/user/appdata/ada-v2/projects:/app/backend/projects
